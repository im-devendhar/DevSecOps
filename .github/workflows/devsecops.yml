name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Run SAST (SonarQube)
      run: echo "Run sonar-scanner here"

    - name: Run SCA (Snyk)
      run: echo "Run snyk test"

    - name: Build Docker Image
      run: docker build -t my-app:latest .

    - name: Scan Image with Trivy
      run: trivy image my-app:latest

    - name: Push Image
      run: echo "Push to Docker Hub or ECR"

    - name: Deploy Application
      run: echo "Deploy to server or Kubernetes"

    - name: Run DAST (OWASP ZAP)
      run: echo "Run ZAP scan"
